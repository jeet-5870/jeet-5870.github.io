<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeet | Portfolio</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --accent-color: #38bdf8;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        #app {
            width: 90%;
            max-width: 600px;
            padding: 2rem;
        }

        h1 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 2rem;
            letter-spacing: -1px;
            color: var(--accent-color);
        }

        ul {
            list-style: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        li {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        li:hover {
            transform: translateY(-3px);
            border-color: var(--accent-color);
            background: rgba(56, 189, 248, 0.1);
        }

        a {
            display: block;
            padding: 1.2rem;
            color: var(--text-main);
            text-decoration: none;
            font-weight: 500;
            font-size: 1.1rem;
            text-align: center;
            word-break: break-all;
        }

        li:hover a {
            color: var(--accent-color);
        }

        /* Small footer decoration */
        .footer {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>

<body>
    <div id="app">
        <h1>Project Showcase</h1>
        <ul>
            <li><a href="/omnifood" target="_blank">Omnifood - Food Delivery App</a></li>
            <li><a href="/Weather-app" target="_blank">Weather App - Real-time Weather Updates</a></li>
            <li><a href="/9PointZero" target="_blank">9PointZero - Tech Blog</a></li>
            <li><a href="/CompeteHub" target="_blank">CompeteHub - Competitive Programming Platform</a></li>
            <li><a href="/beyond-null-and-void" target="_blank">Beyond Null and Void - Tech Podcast</a></li>    
            <li><a href="/laundry" target="_blank">Laundry - Laundry Management System</a></li> 
            <li><a href="/login-form" target="_blank">Login Form</a></li>
            <li><a href="/login-page" target="_blank">Login Page</a></li>
        </ul>
        <div class="footer">Developed by Jeet</div>
    </div>
</body>
</html>
